<style>

body{
margin:0;
font-family:Poppins,sans-serif;
background:linear-gradient(135deg,#ffd6e7,#fff4f8);
overflow-x:hidden;
}

/* INTRO */

#intro{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
transition:1s;
}

.tap{
color:#ff2f72;
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:.4;}
}

.envelope{
width:280px;
height:180px;
position:relative;
cursor:pointer;
animation:float 2s ease-in-out infinite;
}

.cover{
position:absolute;
bottom:0;
width:100%;
height:100%;
background:#ff4f86;
clip-path:polygon(0 100%,50% 45%,100% 100%,100% 100%,0 100%);
border-radius:10px;
}

.flap{
position:absolute;
width:100%;
height:100%;
background:#ff7da3;
clip-path:polygon(0 0,50% 60%,100% 0);
transform-origin:top;
transition:1s;
z-index:5;
border-radius:10px;
}

.paper{
position:absolute;
width:80%;
height:120px;
background:white;
left:10%;
top:25px;
border-radius:10px;
display:flex;
justify-content:center;
align-items:center;
font-size:50px;
transition:1.2s;
z-index:2;
box-shadow:0 10px 20px rgba(0,0,0,.2);
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-15px);}
}

/* CARD */

#mainCard{
display:none;
opacity:0;
transform:translateY(300px) scale(.5) rotateX(90deg);
transition:1.4s;
}

.card{
width:90%;
max-width:700px;
margin:40px auto;
padding:25px;
background:white;
border-radius:25px;
box-shadow:0 20px 50px rgba(0,0,0,.2);
animation:pop 1.5s;
}

@keyframes pop{
0%{
opacity:0;
transform:scale(.5);
}
100%{
opacity:1;
transform:scale(1);
}
}

.profile{
width:150px;
height:150px;
border-radius:50%;
display:block;
margin:auto;
border:6px solid pink;
object-fit:cover;
}

h1{
text-align:center;
color:#ff2f72;
}

.message{
font-size:18px;
line-height:1.8;
color:#444;
margin-top:20px;
}

.btn{
margin:30px auto;
display:block;
padding:15px 35px;
border:none;
border-radius:50px;
background:#ff2f72;
color:white;
font-size:18px;
cursor:pointer;
}

#memory{
display:none;
margin-top:20px;
animation:fade 1s;
}

#memory img{
width:100%;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

@keyframes fade{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* Hearts */

.heart{
position:fixed;
font-size:24px;
animation:rise 8s linear infinite;
opacity:.7;
z-index:-1;
}

@keyframes rise{
0%{
transform:translateY(100vh);
}
100%{
transform:translateY(-120px);
}
}

</style>

<script>

function openLetter(){

document.querySelector(".flap").style.transform="rotateX(180deg)";

document.querySelector(".paper").style.transform="translateY(-130px)";

setTimeout(function(){

document.getElementById("intro").style.opacity="0";
document.getElementById("intro").style.transform="scale(.7)";

},1200);

setTimeout(function(){

document.getElementById("intro").style.display="none";

let card=document.getElementById("mainCard");

card.style.display="block";

setTimeout(function(){

card.style.opacity="1";
card.style.transform="translateY(0) scale(1) rotateX(0deg)";

},100);

},1800);

}

function showMemory(){

document.getElementById("memory").style.display="block";

}

for(let i=0;i<30;i++){

let h=document.createElement("div");

h.className="heart";

h.innerHTML="💖";

h.style.left=Math.random()*100+"vw";

h.style.animationDuration=(5+Math.random()*5)+"s";

h.style.fontSize=(20+Math.random()*25)+"px";

document.body.appendChild(h);

}

</script>
